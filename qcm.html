<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>QCM — Phonologie</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header>
    <a href="index.html">← Accueil</a>
    <h1 id="ex-title">Chargement…</h1>
    <span id="ex-td" class="badge badge-qcm"></span>
  </header>

  <div class="container">
    <div class="progress-bar"><div class="progress-fill" id="progress" style="width:0%"></div></div>
    <div id="questions-area"></div>
    <div id="score-box" class="score-box" style="display:none">
      <h2>Résultat</h2>
      <div class="score-number" id="score-num">—</div>
      <div class="score-label" id="score-label"></div>
      <div class="nav-row" style="justify-content:center">
        <button class="btn btn-primary" onclick="restart()">Recommencer</button>
        <a href="index.html" class="btn btn-outline">Accueil</a>
      </div>
    </div>
  </div>

  <script>
    const params = new URLSearchParams(location.search);
    const dataFile = params.get('data') || 'data/ex-qcm-01.json';
    let data, current = 0, score = 0, answered = [];

    fetch(dataFile).then(r => r.json()).then(d => {
      data = d;
      document.title = d.title + ' — QCM';
      document.getElementById('ex-title').textContent = d.title;
      document.getElementById('ex-td').textContent = d.td || '';
      answered = Array(d.questions.length).fill(null);
      render(0);
    });

    function render(i) {
      const q = data.questions[i];
      const pct = Math.round(i / data.questions.length * 100);
      document.getElementById('progress').style.width = pct + '%';

      document.getElementById('questions-area').innerHTML = `
        <div class="card">
          <p class="counter">Question ${i + 1} / ${data.questions.length}</p>
          <p class="question-prompt">${q.prompt}</p>
          <div class="options" id="opts">
            ${q.options.map((o, j) =>
              `<button class="option-btn" onclick="pick(${i},${j})">${o}</button>`
            ).join('')}
          </div>
          <div id="fb" class="feedback" style="display:none"></div>
          <div class="nav-row" id="nav" style="display:none">
            ${i < data.questions.length - 1
              ? `<button class="btn btn-primary" onclick="render(${i + 1})">Suivant →</button>`
              : `<button class="btn btn-primary" onclick="showScore()">Voir le résultat</button>`}
          </div>
        </div>`;
    }

    function pick(qi, j) {
      if (answered[qi] !== null) return;
      const q = data.questions[qi];
      const ok = j === q.answer;
      answered[qi] = ok;
      if (ok) score++;

      document.querySelectorAll('.option-btn').forEach((b, k) => {
        b.disabled = true;
        if (k === q.answer) b.classList.add('correct');
        else if (k === j) b.classList.add('wrong');
      });

      const fb = document.getElementById('fb');
      fb.style.display = 'block';
      fb.className = 'feedback ' + (ok ? 'ok' : 'ko');
      fb.innerHTML = (ok
        ? '<span class="ok-text">✓ Correct !</span> '
        : '<span class="ko-text">✗ Incorrect.</span> ') + q.feedback;
      document.getElementById('nav').style.display = 'flex';
    }

    function showScore() {
      document.getElementById('questions-area').style.display = 'none';
      document.getElementById('progress').style.width = '100%';
      const box = document.getElementById('score-box');
      box.style.display = 'block';
      const pct = Math.round(score / data.questions.length * 100);
      document.getElementById('score-num').textContent = score + ' / ' + data.questions.length;
      document.getElementById('score-label').textContent =
        pct >= 80 ? '🎉 Excellent !' : pct >= 60 ? '👍 Bien !' : '📚 À retravailler.';
    }

    function restart() {
      score = 0; current = 0;
      answered = Array(data.questions.length).fill(null);
      document.getElementById('score-box').style.display = 'none';
      document.getElementById('questions-area').style.display = 'block';
      render(0);
    }
  </script>
</body>
</html>
