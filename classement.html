<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Classement — Phonologie</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .categories-row { display: flex; gap: .8rem; flex-wrap: wrap; margin-bottom: 1.2rem; }
    .cat-col {
      flex: 1; min-width: 120px; border: 2px solid var(--border); border-radius: 8px;
      padding: .6rem; background: #fafafa; transition: border-color .15s;
    }
    .cat-col.active-target { border-color: var(--primary); background: #eef2f7; }
    .cat-header {
      font-family: 'Noto Sans','DejaVu Sans',sans-serif;
      font-size: 1.15rem; font-weight: 700; text-align: center;
      padding: .4rem; margin-bottom: .4rem;
      border-radius: 5px; background: var(--primary); color: white;
    }
    .cat-words { min-height: 60px; display: flex; flex-wrap: wrap; gap: .3rem; }
    .placed-word {
      padding: .3rem .65rem; border-radius: 5px; font-size: .9rem;
      border: 1px solid var(--border); background: white;
    }
    .placed-word.ok { background: #d1e7dd; border-color: var(--success); }
    .placed-word.ko { background: #f8d7da; border-color: var(--accent); }
    .words-pool { display: flex; flex-wrap: wrap; gap: .5rem; margin-bottom: 1rem; }
    .pool-word {
      padding: .45rem .9rem; border: 2px solid var(--border); border-radius: 6px;
      background: white; cursor: pointer; font-size: .95rem; font-family: inherit;
      transition: border-color .15s, background .15s;
    }
    .pool-word:hover { border-color: var(--primary); background: #eef2f7; }
    .pool-word.selected { border-color: var(--primary); background: #dce8f5; font-weight: 600; }
    .pool-word.placed { opacity: .3; cursor: default; pointer-events: none; }
    .cat-btn {
      width: 100%; padding: .4rem; margin-top: .4rem;
      border: 1px dashed var(--border); border-radius: 5px;
      background: transparent; cursor: pointer; font-size: .85rem; color: var(--muted);
      transition: background .15s;
    }
    .cat-btn:hover { background: #e9ecef; }
    .instruction { font-size: .9rem; color: var(--muted); margin-bottom: .8rem; }
    .validate-row { margin-top: .8rem; }
  </style>
</head>
<body>
  <header>
    <a href="index.html">← Accueil</a>
    <h1 id="ex-title">Chargement…</h1>
    <span id="ex-td" class="badge badge-classement" style="background:#fce4d0;color:#7d3000;">Classement</span>
  </header>
  <div class="container">
    <div class="progress-bar"><div class="progress-fill" id="progress" style="width:0%"></div></div>
    <div id="ex-area"></div>
    <div id="score-box" class="score-box" style="display:none">
      <h2>Résultat</h2>
      <div class="score-number" id="score-num">—</div>
      <div class="score-label" id="score-label"></div>
      <div class="nav-row" style="justify-content:center">
        <button class="btn btn-primary" onclick="restart()">Recommencer</button>
        <a href="index.html" class="btn btn-outline">Accueil</a>
      </div>
    </div>
  </div>
  <script>
  const params = new URLSearchParams(location.search);
  const dataFile = params.get('data') || 'data/ex-classement-01.json';
  let data, current = 0, totalScore = 0, totalWords = 0, answered = [];

  fetch(dataFile).then(r => r.json()).then(d => {
    data = d;
    document.title = d.title + ' — Classement';
    document.getElementById('ex-title').textContent = d.title;
    document.getElementById('ex-td').textContent = d.td || '';
    answered = Array(d.rounds.length).fill(null);
    totalWords = d.rounds.reduce((s, r) => s + r.words.length, 0);
    render(0);
  });

  let selectedWord = null;
  let placements = {}; // wordIndex → catIndex

  function render(i) {
    current = i;
    selectedWord = null;
    placements = {};
    const round = data.rounds[i];
    const pct = Math.round(i / data.rounds.length * 100);
    document.getElementById('progress').style.width = pct + '%';

    document.getElementById('ex-area').innerHTML = `
      <div class="card">
        <p class="counter">Série ${i+1} / ${data.rounds.length}</p>
        <p class="question-prompt">${round.instruction}</p>
        <p class="instruction">Cliquez un mot, puis cliquez une colonne pour le classer.</p>
        <div class="categories-row" id="cats">
          ${round.categories.map((cat, ci) => `
            <div class="cat-col" id="cat-${ci}">
              <div class="cat-header">${cat}</div>
              <div class="cat-words" id="catwords-${ci}"></div>
              <button class="cat-btn" onclick="placeInCat(${ci})">+ Placer ici</button>
            </div>
          `).join('')}
        </div>
        <div class="words-pool" id="pool">
          ${round.words.map((w, wi) =>
            `<button class="pool-word" id="pw-${wi}" onclick="selectWord(${wi})">${w.word}</button>`
          ).join('')}
        </div>
        <div id="validate-row" class="validate-row">
          <button class="btn btn-primary" id="validate-btn" onclick="validate()" disabled>Valider le classement</button>
        </div>
        <div id="fb" class="feedback" style="display:none"></div>
        <div class="nav-row" id="nav" style="display:none">
          ${i < data.rounds.length - 1
            ? `<button class="btn btn-primary" onclick="render(${i+1})">Suivant →</button>`
            : `<button class="btn btn-primary" onclick="showScore()">Voir le résultat</button>`}
        </div>
      </div>`;
  }

  function selectWord(wi) {
    if (answered[current] !== null) return;
    if (Object.values(placements).some((_, k) => Object.keys(placements)[k] == wi)) return; // already placed
    if (document.getElementById('pw-' + wi).classList.contains('placed')) return;
    document.querySelectorAll('.pool-word').forEach(b => b.classList.remove('selected'));
    document.getElementById('pw-' + wi)?.classList.add('selected');
    selectedWord = wi;
  }

  function placeInCat(ci) {
    if (answered[current] !== null) return;
    if (selectedWord === null) return;
    const round = data.rounds[current];
    placements[selectedWord] = ci;
    // Mark pool word as placed
    document.getElementById('pw-' + selectedWord)?.classList.remove('selected');
    document.getElementById('pw-' + selectedWord)?.classList.add('placed');
    // Add to cat display (unvalidated)
    const catWords = document.getElementById('catwords-' + ci);
    const span = document.createElement('span');
    span.className = 'placed-word';
    span.id = 'pw-cat-' + selectedWord;
    span.textContent = round.words[selectedWord].word;
    span.onclick = () => removeFromCat(selectedWord, ci);
    span.title = 'Cliquer pour retirer';
    span.style.cursor = 'pointer';
    catWords.appendChild(span);
    selectedWord = null;
    // Enable validate if all words placed
    if (Object.keys(placements).length === round.words.length) {
      document.getElementById('validate-btn').disabled = false;
    }
  }

  function removeFromCat(wi, ci) {
    if (answered[current] !== null) return;
    delete placements[wi];
    document.getElementById('pw-cat-' + wi)?.remove();
    document.getElementById('pw-' + wi)?.classList.remove('placed');
    document.getElementById('validate-btn').disabled = true;
  }

  function validate() {
    if (answered[current] !== null) return;
    const round = data.rounds[current];
    let roundScore = 0;
    round.words.forEach((w, wi) => {
      const placed = placements[wi];
      const ok = placed === w.category;
      if (ok) roundScore++;
      const span = document.getElementById('pw-cat-' + wi);
      if (span) span.className = 'placed-word ' + (ok ? 'ok' : 'ko');
    });
    totalScore += roundScore;
    answered[current] = roundScore;
    document.getElementById('validate-btn').disabled = true;

    const fb = document.getElementById('fb');
    fb.style.display = 'block';
    const allOk = roundScore === round.words.length;
    fb.className = 'feedback ' + (allOk ? 'ok' : 'ko');
    fb.innerHTML = (allOk
      ? `<span class="ok-text">✓ Parfait !</span> `
      : `<span class="ko-text">${roundScore}/${round.words.length} corrects.</span> `)
      + (round.explanation || '');
    document.getElementById('nav').style.display = 'flex';
  }

  function showScore() {
    document.getElementById('ex-area').style.display = 'none';
    document.getElementById('progress').style.width = '100%';
    document.getElementById('score-box').style.display = 'block';
    const pct = Math.round(totalScore / totalWords * 100);
    document.getElementById('score-num').textContent = totalScore + ' / ' + totalWords;
    document.getElementById('score-label').textContent =
      pct >= 80 ? '🎉 Excellent !' : pct >= 60 ? '👍 Bien !' : '📚 À retravailler.';
  }

  function restart() {
    totalScore = 0; answered = Array(data.rounds.length).fill(null);
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('ex-area').style.display = 'block';
    render(0);
  }
  </script>
</body>
</html>
