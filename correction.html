<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Correction — Phonologie</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .word-display { font-size: 2rem; font-weight: 700; color: var(--primary); text-align: center; padding: .8rem 0; }
    .transcription-row {
      display: flex; flex-wrap: wrap; gap: .35rem; align-items: center;
      font-family: 'Noto Sans','DejaVu Sans',sans-serif;
      font-size: 1.3rem; padding: .6rem 0;
    }
    .token {
      padding: .3rem .5rem; border: 2px solid var(--border);
      border-radius: 5px; cursor: pointer; background: white;
      transition: border-color .15s, background .15s;
    }
    .token.slash { border-color: transparent; background: transparent; cursor: default; color: var(--muted); }
    .token:not(.slash):hover { border-color: var(--primary); background: #eef2f7; }
    .token.selected  { border-color: var(--primary); background: #eef2f7; }
    .token.correct   { border-color: var(--success); background: #d1e7dd; cursor: default; }
    .token.wrong-sel { border-color: var(--accent);  background: #f8d7da; }
    .token.error-revealed { border-color: var(--accent); background: #fff3cd; cursor: default; }
    .options-row { display: flex; flex-wrap: wrap; gap: .4rem; margin-top: .8rem; }
    .opt-btn {
      padding: .4rem .8rem; border: 2px solid var(--border); border-radius: 5px;
      background: white; cursor: pointer; font-size: 1.1rem;
      font-family: 'Noto Sans','DejaVu Sans',sans-serif;
      transition: border-color .15s;
    }
    .opt-btn:hover { border-color: var(--primary); }
    .opt-btn.opt-correct { border-color: var(--success); background: #d1e7dd; }
    .opt-btn.opt-wrong   { border-color: var(--accent);  background: #f8d7da; }
    .hint-toggle { font-size: .82rem; color: var(--muted); cursor: pointer; text-decoration: underline; text-align: right; }
    .hint-box { background: #fff3cd; border: 1px solid #ffe69c; border-radius: 6px; padding: .6rem .9rem; font-size: .88rem; margin: .4rem 0; display: none; }
    .instruction { font-size: .88rem; color: var(--muted); margin-bottom: .3rem; }
  </style>
</head>
<body>
  <header>
    <a href="index.html">← Accueil</a>
    <h1 id="ex-title">Chargement…</h1>
    <span id="ex-td" class="badge badge-correction" style="background:#e8d5f5;color:#4a1580;">Correction</span>
  </header>
  <div class="container">
    <div class="progress-bar"><div class="progress-fill" id="progress" style="width:0%"></div></div>
    <div id="item-area"></div>
    <div id="score-box" class="score-box" style="display:none">
      <h2>Résultat</h2>
      <div class="score-number" id="score-num">—</div>
      <div class="score-label" id="score-label"></div>
      <div class="nav-row" style="justify-content:center">
        <button class="btn btn-primary" onclick="restart()">Recommencer</button>
        <a href="index.html" class="btn btn-outline">Accueil</a>
      </div>
    </div>
  </div>
  <script>
  const MULTI = ['tʃ','dʒ','iː','ɑː','ɔː','ɜː','uː','eɪ','aɪ','ɔɪ','əʊ','aʊ','ɪə','eə','ʊə'];

  function tokenize(s) {
    const tokens = [];
    // strip outer slashes for processing
    const inner = s.replace(/^\/|\/$/g, '');
    let i = 0;
    while (i < inner.length) {
      let found = false;
      for (const m of MULTI) {
        if (inner.startsWith(m, i)) { tokens.push(m); i += m.length; found = true; break; }
      }
      if (!found) { tokens.push(inner[i]); i++; }
    }
    return tokens;
  }

  const params = new URLSearchParams(location.search);
  const dataFile = params.get('data') || 'data/ex-correction-01.json';
  let data, current = 0, score = 0, answered = [];
  let selectedToken = null;

  fetch(dataFile).then(r => r.json()).then(d => {
    data = d;
    document.title = d.title + ' — Correction';
    document.getElementById('ex-title').textContent = d.title;
    document.getElementById('ex-td').textContent = d.td || '';
    answered = Array(d.items.length).fill(null);
    render(0);
  });

  function render(i) {
    current = i;
    selectedToken = null;
    const it = data.items[i];
    const tokens = tokenize(it.transcription_shown);
    const pct = Math.round(i / data.items.length * 100);
    document.getElementById('progress').style.width = pct + '%';

    document.getElementById('item-area').innerHTML = `
      <div class="card">
        <p class="counter">Item ${i+1} / ${data.items.length}</p>
        <div class="word-display">${it.word}</div>
        <p class="instruction">Cette transcription contient une erreur. Cliquez sur le phonème incorrect, puis choisissez la correction.</p>
        <div class="hint-toggle" onclick="toggleHint()">💡 Indice</div>
        <div class="hint-box" id="hint">${it.hint || ''}</div>
        <div class="transcription-row" id="tokens-row">
          <span class="token slash">/</span>
          ${tokens.map((t, j) =>
            `<span class="token" id="tok-${j}" data-idx="${j}" onclick="selectToken(${j})">${t}</span>`
          ).join('')}
          <span class="token slash">/</span>
        </div>
        <div id="options-area"></div>
        <div id="fb" class="feedback" style="display:none"></div>
        <div class="nav-row" id="nav" style="display:none">
          ${i < data.items.length - 1
            ? `<button class="btn btn-primary" onclick="render(${i+1})">Suivant →</button>`
            : `<button class="btn btn-primary" onclick="showScore()">Voir le résultat</button>`}
        </div>
      </div>`;
  }

  function selectToken(j) {
    if (answered[current] !== null) return;
    const it = data.items[current];
    // deselect previous
    document.querySelectorAll('.token:not(.slash)').forEach(t => t.classList.remove('selected'));
    document.getElementById('tok-' + j).classList.add('selected');
    selectedToken = j;

    // Show options
    const area = document.getElementById('options-area');
    area.innerHTML = `<p class="instruction" style="margin-top:.6rem">Sélectionnez la correction :</p>
      <div class="options-row">
        ${it.options.map(opt =>
          `<button class="opt-btn" onclick="pickOption('${opt.replace(/'/g,"\\'")}', ${j})">${opt}</button>`
        ).join('')}
      </div>`;
  }

  function pickOption(opt, tokenIdx) {
    if (answered[current] !== null) return;
    const it = data.items[current];
    const tokens = tokenize(it.transcription_shown);
    const correctToken = tokenIdx === it.error_index;
    const correctOpt   = opt === it.replacement;
    const ok = correctToken && correctOpt;
    answered[current] = ok;
    if (ok) score++;

    // Disable options
    document.querySelectorAll('.opt-btn').forEach(b => {
      b.disabled = true;
      if (b.textContent === it.replacement) b.classList.add('opt-correct');
      else if (b.textContent === opt && !ok) b.classList.add('opt-wrong');
    });

    // Highlight error token
    document.querySelectorAll('.token:not(.slash)').forEach((t, k) => {
      t.classList.remove('selected');
      if (k === it.error_index) t.classList.add(ok ? 'correct' : 'error-revealed');
    });
    if (!ok && tokenIdx !== it.error_index) {
      document.getElementById('tok-' + tokenIdx)?.classList.add('wrong-sel');
    }

    const fb = document.getElementById('fb');
    fb.style.display = 'block';
    fb.className = 'feedback ' + (ok ? 'ok' : 'ko');
    fb.innerHTML = (ok
      ? `<span class="ok-text">✓ Correct !</span> `
      : `<span class="ko-text">✗ Incorrect.</span> L'erreur était <strong>${tokens[it.error_index]}</strong> → <strong>${it.replacement}</strong>. `)
      + it.explanation;
    document.getElementById('nav').style.display = 'flex';
  }

  function toggleHint() {
    const h = document.getElementById('hint');
    h.style.display = h.style.display === 'none' ? 'block' : 'none';
  }

  function showScore() {
    document.getElementById('item-area').style.display = 'none';
    document.getElementById('progress').style.width = '100%';
    document.getElementById('score-box').style.display = 'block';
    const pct = Math.round(score / data.items.length * 100);
    document.getElementById('score-num').textContent = score + ' / ' + data.items.length;
    document.getElementById('score-label').textContent =
      pct >= 80 ? '🎉 Excellent !' : pct >= 60 ? '👍 Bien !' : '📚 À retravailler.';
  }

  function restart() {
    score = 0; answered = Array(data.items.length).fill(null);
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('item-area').style.display = 'block';
    render(0);
  }
  </script>
</body>
</html>
