<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Appariement — Phonologie</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .pairs-grid { display: grid; grid-template-columns: 1fr 1fr; gap: .8rem; margin-top: .8rem; }
    .col-label { font-size: .78rem; text-transform: uppercase; letter-spacing: .06em; color: var(--muted); margin-bottom: .4rem; }
    .item-btn {
      width: 100%; text-align: center; padding: .6rem .9rem;
      border: 2px solid var(--border); border-radius: 7px;
      background: white; cursor: pointer; font-size: .95rem; font-family: inherit;
      transition: border-color .15s, background .15s;
      margin-bottom: .4rem;
      font-family: 'Noto Sans','DejaVu Sans',sans-serif;
    }
    .item-btn:hover:not(:disabled):not(.matched):not(.used) { border-color: var(--primary); background: #eef2f7; }
    .item-btn.selected  { border-color: var(--primary); background: #dce8f5; font-weight: 700; }
    .item-btn.matched   { border-color: var(--success); background: #d1e7dd; cursor: default; }
    .item-btn.wrong-flash { border-color: var(--accent); background: #f8d7da; }
    .item-btn.used      { opacity: .3; cursor: default; pointer-events: none; }
    .item-btn:disabled  { cursor: default; }
    .score-inline { font-weight: 600; color: var(--primary); }
    .instruction { font-size: .88rem; color: var(--muted); margin-bottom: .4rem; }
  </style>
</head>
<body>
  <header>
    <a href="index.html">← Accueil</a>
    <h1 id="ex-title">Chargement…</h1>
    <span id="ex-td" class="badge badge-appariement" style="background:#d4e9ff;color:#003a75;">Appariement</span>
  </header>
  <div class="container">
    <div class="progress-bar"><div class="progress-fill" id="progress" style="width:0%"></div></div>
    <div id="round-area"></div>
    <div id="score-box" class="score-box" style="display:none">
      <h2>Résultat</h2>
      <div class="score-number" id="score-num">—</div>
      <div class="score-label" id="score-label"></div>
      <div class="nav-row" style="justify-content:center">
        <button class="btn btn-primary" onclick="restart()">Recommencer</button>
        <a href="index.html" class="btn btn-outline">Accueil</a>
      </div>
    </div>
  </div>
  <script>
  const params = new URLSearchParams(location.search);
  const dataFile = params.get('data') || 'data/ex-appariement-01.json';
  let data, current = 0, totalCorrect = 0, totalPairs = 0;
  let selectedLeft = null, selectedRight = null;
  let matchedLeft = new Set(), matchedRight = new Set();
  let wrongCount = 0;
  let roundErrors = 0;

  fetch(dataFile).then(r => r.json()).then(d => {
    data = d;
    document.title = d.title + ' — Appariement';
    document.getElementById('ex-title').textContent = d.title;
    document.getElementById('ex-td').textContent = d.td || '';
    totalPairs = d.rounds.reduce((s, r) => s + r.pairs.length, 0);
    render(0);
  });

  function shuffle(arr) {
    const a = [...arr]; for (let i = a.length-1; i>0; i--) { const j = Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a;
  }

  let shuffledRight = [];

  function render(i) {
    current = i;
    selectedLeft = null; selectedRight = null;
    matchedLeft = new Set(); matchedRight = new Set();
    wrongCount = 0; roundErrors = 0;
    const round = data.rounds[i];
    shuffledRight = shuffle(round.pairs.map((p, j) => ({ trans: p.transcription, origIdx: j })));
    const pct = Math.round(i / data.rounds.length * 100);
    document.getElementById('progress').style.width = pct + '%';

    document.getElementById('round-area').innerHTML = `
      <div class="card">
        <p class="counter">Série ${i+1} / ${data.rounds.length}</p>
        <p class="question-prompt">${round.instruction || 'Associez chaque mot à sa transcription.'}</p>
        <p class="instruction">Cliquez un mot (gauche) puis sa transcription (droite).</p>
        <div class="pairs-grid">
          <div>
            <div class="col-label">Mots</div>
            ${round.pairs.map((p, j) =>
              `<button class="item-btn" id="left-${j}" onclick="pickLeft(${j})">${p.word}</button>`
            ).join('')}
          </div>
          <div>
            <div class="col-label">Transcriptions</div>
            ${shuffledRight.map((r, j) =>
              `<button class="item-btn ipa" id="right-${j}" onclick="pickRight(${j})">${r.trans}</button>`
            ).join('')}
          </div>
        </div>
        <div id="round-fb" class="feedback" style="display:none;margin-top:.8rem"></div>
        <div class="nav-row" id="nav" style="display:none">
          ${i < data.rounds.length - 1
            ? `<button class="btn btn-primary" onclick="render(${i+1})">Suivant →</button>`
            : `<button class="btn btn-primary" onclick="showScore()">Voir le résultat</button>`}
        </div>
      </div>`;
  }

  function pickLeft(j) {
    if (matchedLeft.has(j)) return;
    document.querySelectorAll('.item-btn[id^="left-"]').forEach(b => b.classList.remove('selected'));
    document.getElementById('left-' + j).classList.add('selected');
    selectedLeft = j;
    tryMatch();
  }

  function pickRight(j) {
    if (matchedRight.has(j)) return;
    document.querySelectorAll('.item-btn[id^="right-"]').forEach(b => b.classList.remove('selected'));
    document.getElementById('right-' + j).classList.add('selected');
    selectedRight = j;
    tryMatch();
  }

  function tryMatch() {
    if (selectedLeft === null || selectedRight === null) return;
    const round = data.rounds[current];
    const leftPair = round.pairs[selectedLeft];
    const rightPair = shuffledRight[selectedRight];
    const ok = rightPair.origIdx === selectedLeft;

    const lb = document.getElementById('left-' + selectedLeft);
    const rb = document.getElementById('right-' + selectedRight);

    if (ok) {
      lb.classList.remove('selected'); lb.classList.add('matched'); lb.disabled = true;
      rb.classList.remove('selected'); rb.classList.add('matched'); rb.disabled = true;
      matchedLeft.add(selectedLeft); matchedRight.add(selectedRight);
      totalCorrect++;
    } else {
      wrongCount++; roundErrors++;
      lb.classList.add('wrong-flash'); rb.classList.add('wrong-flash');
      setTimeout(() => {
        lb.classList.remove('wrong-flash', 'selected');
        rb.classList.remove('wrong-flash', 'selected');
      }, 700);
    }

    selectedLeft = null; selectedRight = null;

    // Check if round complete
    if (matchedLeft.size === round.pairs.length) {
      const fb = document.getElementById('round-fb');
      fb.style.display = 'block';
      fb.className = 'feedback ' + (roundErrors === 0 ? 'ok' : 'ko');
      fb.innerHTML = roundErrors === 0
        ? '<span class="ok-text">✓ Parfait, aucune erreur !</span>'
        : `<span class="ko-text">${roundErrors} erreur(s)</span> avant de compléter la série.`;
      document.getElementById('nav').style.display = 'flex';
    }
  }

  function showScore() {
    document.getElementById('round-area').style.display = 'none';
    document.getElementById('progress').style.width = '100%';
    document.getElementById('score-box').style.display = 'block';
    const pct = Math.round(totalCorrect / totalPairs * 100);
    document.getElementById('score-num').textContent = totalCorrect + ' / ' + totalPairs;
    document.getElementById('score-label').textContent =
      pct >= 80 ? '🎉 Excellent !' : pct >= 60 ? '👍 Bien !' : '📚 À retravailler.';
  }

  function restart() {
    totalCorrect = 0;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('round-area').style.display = 'block';
    render(0);
  }
  </script>
</body>
</html>
