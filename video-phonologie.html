<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Activité vidéo · Phonologie anglaise</title>
  <style>
    :root {
      --primary: #1e3a5f;
      --accent:  #c0392b;
      --success: #27ae60;
      --border:  #dee2e6;
      --light:   #f8f9fa;
      --muted:   #6c757d;
      --text:    #212529;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--light);
      color: var(--text);
      font-size: 0.95rem;
      line-height: 1.55;
    }

    /* ── Header ── */
    .hero {
      background: var(--primary);
      color: #fff;
      padding: 1.25rem 1.75rem;
    }
    .hero h1  { font-size: 1.15rem; font-weight: 700; margin-bottom: .2rem; }
    .hero .sub { font-size: .82rem; opacity: .75; }

    /* ── Progress ── */
    .prog-wrap {
      background: #16304f;
      padding: .45rem 1.75rem;
      display: flex; align-items: center; gap: 1rem;
    }
    .prog-bar  { flex: 1; height: 5px; background: rgba(255,255,255,.2); border-radius: 3px; overflow: hidden; }
    .prog-fill { height: 100%; background: #6dbfff; border-radius: 3px; transition: width .3s ease; }
    .prog-label { color: #fff; font-size: .78rem; white-space: nowrap; }

    /* ── Section banner ── */
    .section-banner {
      background: #e8f0fb;
      border-left: 4px solid var(--primary);
      padding: .45rem 1.75rem;
      font-size: .78rem; font-weight: 700; color: var(--primary);
      letter-spacing: .04em; text-transform: uppercase;
    }

    /* ── Layout ── */
    main { max-width: 1180px; margin: 0 auto; padding: 1.5rem 1.25rem 2rem; }

    .layout {
      display: grid;
      grid-template-columns: 640px 1fr;
      gap: 1.5rem;
      align-items: start;
    }
    @media (max-width: 900px) { .layout { grid-template-columns: 1fr; } }

    /* ── Video panel ── */
    .video-panel { background: #111; border-radius: 8px; overflow: hidden; min-height: 385px; }
    #yg-widget   { width: 100%; min-height: 385px; }

    /* ── Exercise card ── */
    .ex-card {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1.25rem 1.5rem;
    }

    .badge {
      display: inline-block; font-size: .68rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: .05em;
      padding: .2em .65em; border-radius: 4px; margin-bottom: .85rem;
    }
    .badge-qcm          { background: #cfe2ff; color: #084298; }
    .badge-transcription { background: #d1e7dd; color: #0a3622; }
    .badge-correction   { background: #e8d5f5; color: #4a1580; }

    .question { font-size: .92rem; margin-bottom: 1rem; }
    .question em { font-style: italic; font-weight: 600; color: var(--primary); }

    .wrong-box {
      background: #fff3cd; border: 1px solid #ffc107;
      border-radius: 6px; padding: .55rem .85rem; margin-bottom: .85rem; font-size: .8rem;
    }
    .wrong-box .wrong-label { color: var(--muted); margin-bottom: .2rem; }
    .wrong-box code {
      font-family: 'Noto Sans', 'DejaVu Sans', 'Segoe UI', sans-serif;
      font-size: 1.05rem; color: var(--accent);
    }

    /* ── QCM ── */
    .options { display: flex; flex-direction: column; gap: .45rem; margin-bottom: .9rem; }
    .option {
      display: flex; align-items: center; gap: .7rem;
      padding: .55rem .8rem; border: 2px solid var(--border); border-radius: 7px;
      cursor: pointer;
      font-family: 'Noto Sans', 'DejaVu Sans', 'Segoe UI', sans-serif;
      font-size: 1rem;
      transition: border-color .12s, background .12s;
      user-select: none;
    }
    .option:hover:not(.locked) { border-color: var(--primary); background: #eef3fb; }
    .option.sel    { border-color: var(--primary); background: #dde9f7; }
    .option.ok     { border-color: var(--success); background: #d4edda; }
    .option.bad    { border-color: var(--accent);  background: #f8d7da; }
    .option.locked { cursor: default; }
    .opt-letter {
      width: 22px; height: 22px; display: flex; align-items: center; justify-content: center;
      background: #e9ecef; border-radius: 50%; font-size: .72rem; font-weight: 700;
      font-family: system-ui; flex-shrink: 0;
    }

    /* ── IPA input ── */
    .ipa-field {
      width: 100%;
      font-family: 'Noto Sans', 'DejaVu Sans', 'Segoe UI', sans-serif;
      font-size: 1.1rem; padding: .5rem .75rem;
      border: 2px solid var(--border); border-radius: 7px; outline: none;
      margin-bottom: .85rem; transition: border-color .15s;
    }
    .ipa-field:focus { border-color: var(--primary); }
    .ipa-field.ok    { border-color: var(--success); background: #d4edda; }
    .ipa-field.bad   { border-color: var(--accent);  background: #f8d7da; }

    /* ── Feedback ── */
    .feedback { display: none; margin-top: .85rem; padding: .65rem .9rem; border-radius: 7px; font-size: .875rem; line-height: 1.55; }
    .feedback.show { display: block; }
    .feedback.ok  { background: #d4edda; border-left: 3px solid var(--success); }
    .feedback.bad { background: #fff3cd; border-left: 3px solid #e0a800; }
    .feedback.ans { background: #f8f9fa; border-left: 3px solid #adb5bd; }
    .feedback .ans-val { font-family: 'Noto Sans','DejaVu Sans','Segoe UI',sans-serif; font-size: 1.05rem; font-weight: 700; color: var(--primary); }

    /* ── Buttons ── */
    .btn-row { display: flex; gap: .5rem; flex-wrap: wrap; margin-top: .75rem; }
    .btn {
      padding: .45rem 1.1rem; font-size: .83rem; font-weight: 600;
      border: none; border-radius: 6px; cursor: pointer; transition: filter .12s;
    }
    .btn:hover:not(:disabled) { filter: brightness(.9); }
    .btn:disabled { opacity: .4; cursor: default; }
    .btn-primary { background: var(--primary); color: #fff; }
    .btn-outline { background: #fff; color: var(--text); border: 1px solid var(--border); }
    .btn-ghost   { background: #f0f0f0; color: var(--muted); font-weight: 400; }

    /* ── IPA Keyboard ── */
    .keyboard { display: none; background: #fff; border: 1px solid var(--border); border-radius: 10px; padding: .9rem 1.1rem; margin-top: 1.4rem; }
    .keyboard.show { display: block; }
    .kb-row-label { font-size: .68rem; font-weight: 700; text-transform: uppercase; color: var(--muted); letter-spacing: .05em; margin: .55rem 0 .25rem; }
    .kb-row-label:first-child { margin-top: 0; }
    .kb-row { display: flex; flex-wrap: wrap; gap: 4px; }
    .k {
      font-family: 'Noto Sans', 'DejaVu Sans', 'Segoe UI', sans-serif;
      font-size: .92rem; padding: .3rem .55rem; min-width: 36px; text-align: center;
      background: #f4f4f4; border: 1px solid #d8d8d8; border-radius: 5px;
      cursor: pointer; user-select: none; transition: background .08s, border-color .08s;
    }
    .k:hover  { background: #dde9f7; border-color: var(--primary); }
    .k:active { background: #bdd2ee; }
    .k.del    { background: #fff0f0; border-color: #f5c0c0; color: var(--accent); font-size: .8rem; }
    .k.del:hover { background: #ffe0e0; }

    /* ── Nav ── */
    .nav-row { display: flex; justify-content: space-between; align-items: center; margin-top: 1.5rem; padding-top: 1.25rem; border-top: 1px solid var(--border); }
    .nav-info { font-size: .82rem; color: var(--muted); }
  </style>
</head>

  'kr-v-long':  ['iː','ɑː','ɔː','uː','ɜː'],
  'kr-diph':    ['eɪ','aɪ','ɔɪ','əʊ','aʊ','ɪə','eə','ʊə'],
  'kr-cons':    ['p','b','t','d','k','g','ʔ','f','v','θ','ð','s','z','ʃ','ʒ','h','tʃ','dʒ','m','n','ŋ','l','r','w','j'],
  'kr-supra':   ['ˈ','ˌ','ː','.',' ','/'],
};

function buildKeyboard() {
  for (const [rowId, keys] of Object.entries(KB)) {
    const row = document.getElementById(rowId);
    keys.forEach(k => {
      const btn = document.createElement('button');
      btn.className = 'k';
      btn.textContent = k === ' ' ? '␣' : k;
      btn.addEventListener('mousedown', e => { e.preventDefault(); insertChar(k); });
      row.appendChild(btn);
    });
  }
  const del = document.createElement('button');
  del.className = 'k del'; del.textContent = '⌫';
  del.addEventListener('mousedown', e => { e.preventDefault(); deleteChar(); });
  document.getElementById('kr-supra').appendChild(del);
}

function getInput() { return document.getElementById('ipa-inp'); }

function insertChar(ch) {
  const el = getInput(); if (!el) return;
  const s = el.selectionStart ?? el.value.length;
  const e = el.selectionEnd   ?? el.value.length;
  el.value = el.value.slice(0, s) + ch + el.value.slice(e);
  el.selectionStart = el.selectionEnd = s + ch.length;
  el.focus();
}

function deleteChar() {
  const el = getInput(); if (!el) return;
  const s = el.selectionStart, e = el.selectionEnd;
  if (s !== e) { el.value = el.value.slice(0,s) + el.value.slice(e); el.selectionStart = el.selectionEnd = s; }
  else if (s > 0) {
    const before = [...el.value.slice(0,s)]; before.pop();
    el.value = before.join('') + el.value.slice(s);
    el.selectionStart = el.selectionEnd = before.join('').length;
  }
  el.focus();
}

/* ── YouGlish (iframe) ── */
function loadWord(word, lang) {
  const c = document.getElementById('yg-widget');
  const url = `https://youglish.com/pronounce/${encodeURIComponent(word)}/${lang || 'english/uk'}`;
  // Recreate iframe to force a fresh load for each exercise
  c.innerHTML = `<iframe src="${url}"
    style="width:100%;height:385px;border:none;display:block;"
    allow="autoplay; fullscreen *; clipboard-write"
    allowfullscreen></iframe>`;
}

/* ── State ── */
let DATA, idx = 0, ans = [];

function initAns(exs) {
  ans = exs.map(ex => ({ val: ex.type === 'correction' ? ex.wrong : '', choice: null, done: false, shown: false }));
}

function saveInput() { const el = getInput(); if (el) ans[idx].val = el.value; }

/* ── Render ── */
function render(i) {
  const ex = DATA.exercises[i], a = ans[i], total = DATA.exercises.length;

  document.getElementById('prog-fill').style.width  = ((i+1)/total*100).toFixed(1)+'%';
  document.getElementById('prog-label').textContent = `${i+1} / ${total}`;
  document.getElementById('sec-banner').textContent = ex.section || '';
  document.getElementById('nav-info').textContent   = `Exercice ${i+1} sur ${total}`;
  document.getElementById('btn-prev').disabled = i === 0;
  document.getElementById('btn-next').textContent = i === total-1 ? 'Terminer' : 'Suivant →';
  document.getElementById('keyboard').classList.toggle('show', ex.type !== 'qcm' && !a.done);

  const badges = { qcm:'<span class="badge badge-qcm">QCM</span>', transcription:'<span class="badge badge-transcription">Transcription</span>', correction:'<span class="badge badge-correction">Correction</span>' };
  let html = badges[ex.type] + `<p class="question">${ex.question}</p>`;

  if (ex.type === 'qcm') {
    html += '<div class="options">';
    ex.options.forEach((opt, oi) => {
      let cls = 'option';
      if (a.done || a.shown) { cls += ' locked'; if (oi===ex.correct) cls+=' ok'; else if (a.choice===oi) cls+=' bad'; }
      else if (a.choice === oi) cls += ' sel';
      const click = (!a.done && !a.shown) ? `onclick="pick(${i},${oi})"` : '';
      html += `<div class="${cls}" ${click}><span class="opt-letter">${'ABCD'[oi]}</span><span>${opt}</span></div>`;
    });
    html += '</div>';
  } else {
    if (ex.type === 'correction')
      html += `<div class="wrong-box"><div class="wrong-label">Transcription incorrecte :</div><code>${ex.wrong}</code></div><p style="font-size:.85rem;margin-bottom:.5rem;color:var(--muted)">Transcription correcte :</p>`;
    const cls = 'ipa-field' + (a.done ? (a.correct ? ' ok' : ' bad') : '');
    html += `<input id="ipa-inp" type="text" class="${cls}" value="${esc(a.val)}" placeholder="/…/" spellcheck="false" autocomplete="off" autocorrect="off" autocapitalize="off" ${a.done?'readonly':''} />`;
  }

  html += '<div class="btn-row">';
  if (!a.done) {
    const dis = ex.type === 'qcm' && a.choice === null;
    html += `<button class="btn btn-primary" ${dis?'disabled':''} onclick="check(${i})">Vérifier</button>`;
  }
  if (!a.shown && !a.done)
    html += `<button class="btn btn-ghost" onclick="reveal(${i})">Voir la réponse</button>`;
  html += '</div>';

  if (a.done || a.shown) {
    const cv = Array.isArray(ex.answer) ? ex.answer[0] : (ex.type==='qcm' ? ex.options[ex.correct] : ex.answer);
    let fbCls = 'feedback show ', fbContent = '';
    if (a.done) {
      fbCls += a.correct ? 'ok' : 'bad';
      fbContent = a.correct
        ? `<strong>✓ Correct !</strong><br>${ex.feedback}`
        : `<strong>✗ Incorrect.</strong> Réponse correcte : <span class="ans-val">${cv}</span><br><br>${ex.feedback}`;
    } else {
      fbCls += 'ans';
      fbContent = `Réponse : <span class="ans-val">${cv}</span><br><br>${ex.feedback}`;
    }
    html += `<div class="${fbCls}">${fbContent}</div>`;
  }

  document.getElementById('ex-card').innerHTML = html;
  const el = getInput();
  if (el && !a.done) { el.focus(); el.setSelectionRange(el.value.length, el.value.length); }
  loadWord(ex.word, ex.lang);
}

function esc(s) {
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

/* ── Answer handling ── */
function normalise(s) {
  return (s||'').replace(/^\s*\/?\s*/,'').replace(/\s*\/?\s*$/,'').replace(/\s+/g,' ').trim();
}

window.pick = function(ei, oi) { if (!ans[ei].done && !ans[ei].shown) { ans[ei].choice = oi; render(ei); } };

window.check = function(ei) {
  const ex = DATA.exercises[ei], a = ans[ei];
  if (ex.type === 'qcm') { a.done = true; a.correct = a.choice === ex.correct; }
  else {
    saveInput(); a.done = true;
    const given = normalise(a.val);
    const acceptable = Array.isArray(ex.answer) ? ex.answer : [ex.answer];
    a.correct = acceptable.some(v => normalise(v) === given);
  }
  render(ei);
};

window.reveal = function(ei) { saveInput(); ans[ei].shown = true; render(ei); };

/* ── Navigation ── */
window.nav = function(d) {
  saveInput();
  const next = idx + d;
  if (next < 0 || next >= DATA.exercises.length) return;
  idx = next; render(idx);
  window.scrollTo({ top: 0, behavior: 'smooth' });
};

/* ── Init (reads inline data — no server required) ── */
function init() {
  DATA = JSON.parse(document.getElementById('activity-data').textContent);
  document.title = DATA.meta.title;
  document.getElementById('act-title').textContent = DATA.meta.title;
  document.getElementById('act-sub').textContent   = DATA.meta.subtitle || '';
  initAns(DATA.exercises);
  buildKeyboard();
  render(0);
}

init();
</script>
