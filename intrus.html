<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Intrus — Phonologie</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header>
    <a href="index.html">← Accueil</a>
    <h1 id="ex-title">Chargement…</h1>
    <span id="ex-td" class="badge badge-intrus"></span>
  </header>

  <div class="container">
    <div class="progress-bar"><div class="progress-fill" id="progress" style="width:0%"></div></div>
    <div id="sets-area"></div>
    <div id="score-box" class="score-box" style="display:none">
      <h2>Résultat</h2>
      <div class="score-number" id="score-num">—</div>
      <div class="score-label" id="score-label"></div>
      <div class="nav-row" style="justify-content:center">
        <button class="btn btn-primary" onclick="restart()">Recommencer</button>
        <a href="index.html" class="btn btn-outline">Accueil</a>
      </div>
    </div>
  </div>

  <script>
    const params = new URLSearchParams(location.search);
    const dataFile = params.get('data') || 'data/ex-intrus-01.json';
    let data, current = 0, score = 0, answered = [];

    fetch(dataFile).then(r => r.json()).then(d => {
      data = d;
      document.title = d.title + ' — Intrus';
      document.getElementById('ex-title').textContent = d.title;
      document.getElementById('ex-td').textContent = d.td || '';
      answered = Array(d.sets.length).fill(null);
      render(0);
    });

    function render(i) {
      const s = data.sets[i];
      const pct = Math.round(i / data.sets.length * 100);
      document.getElementById('progress').style.width = pct + '%';

      document.getElementById('sets-area').innerHTML = `
        <div class="card">
          <p class="counter">Série ${i + 1} / ${data.sets.length}</p>
          <p class="question-prompt">${s.instruction}</p>
          <div class="words-row" id="words">
            ${s.words.map((w, j) =>
              `<button class="word-btn" onclick="pick(${i},${j})">${w}</button>`
            ).join('')}
          </div>
          <div id="fb" class="feedback" style="display:none"></div>
          <div class="nav-row" id="nav" style="display:none">
            ${i < data.sets.length - 1
              ? `<button class="btn btn-primary" onclick="render(${i + 1})">Suivant →</button>`
              : `<button class="btn btn-primary" onclick="showScore()">Voir le résultat</button>`}
          </div>
        </div>`;
    }

    function pick(si, j) {
      if (answered[si] !== null) return;
      const s = data.sets[si];
      const ok = j === s.intrus;
      answered[si] = ok;
      if (ok) score++;

      document.querySelectorAll('.word-btn').forEach((b, k) => {
        b.disabled = true;
        if (k === s.intrus) b.classList.add(ok && k === j ? 'correct' : 'correct');
        else if (k === j) b.classList.add('wrong');
        else b.classList.add('neutral-reveal');
      });

      const fb = document.getElementById('fb');
      fb.style.display = 'block';
      fb.className = 'feedback ' + (ok ? 'ok' : 'ko');
      fb.innerHTML = (ok
        ? '<span class="ok-text">✓ Correct !</span> '
        : '<span class="ko-text">✗ Incorrect.</span> ') + s.explanation;
      document.getElementById('nav').style.display = 'flex';
    }

    function showScore() {
      document.getElementById('sets-area').style.display = 'none';
      document.getElementById('progress').style.width = '100%';
      const box = document.getElementById('score-box');
      box.style.display = 'block';
      const pct = Math.round(score / data.sets.length * 100);
      document.getElementById('score-num').textContent = score + ' / ' + data.sets.length;
      document.getElementById('score-label').textContent =
        pct >= 80 ? '🎉 Excellent !' : pct >= 60 ? '👍 Bien !' : '📚 À retravailler.';
    }

    function restart() {
      score = 0;
      answered = Array(data.sets.length).fill(null);
      document.getElementById('score-box').style.display = 'none';
      document.getElementById('sets-area').style.display = 'block';
      render(0);
    }
  </script>
</body>
</html>
